<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简倒计时器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F9FAFB;
            --text: #111827;
            --muted: #6B7280;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--text);
        }
        input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #D1D5DB;
            border-radius: 0.375rem;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #4338CA;
        }
        .timer {
            font-size: 4rem;
            font-weight: 600;
            margin: 2rem 0;
            color: var(--primary);
        }
        @media (max-width: 640px) {
            .timer {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>极简倒计时器</h1>
        <input type="number" id="minutes" placeholder="输入分钟数" min="1" value="5">
        <button id="start">开始倒计时</button>
        <div id="display" class="timer">00:00</div>
    </div>

    <script>
        const minutesInput = document.getElementById('minutes');
        const startButton = document.getElementById('start');
        const display = document.getElementById('display');

        startButton.addEventListener('click', () => {
            const minutes = parseInt(minutesInput.value);
            if (isNaN(minutes) || minutes < 1) {
                alert('请输入有效的分钟数');
                return;
            }

            let timeLeft = minutes * 60;
            const timer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    display.textContent = '时间到！';
                    display.classList.add('animate__animated', 'animate__heartBeat');
                    return;
                }

                const minutesLeft = Math.floor(timeLeft / 60);
                const secondsLeft = timeLeft % 60;
                display.textContent = `${minutesLeft.toString().padStart(2, '0')}:${secondsLeft.toString().padStart(2, '0')}`;
                timeLeft--;
            }, 1000);
        });
    </script>
</body>
</html>
